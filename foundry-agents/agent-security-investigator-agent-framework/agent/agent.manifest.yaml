name: security-investigator-agent-framework
description: >
  A Foundry hosted security investigator agent built on the Azure AI Agent
  Framework (FoundryChatClient + ResponsesHostServer). Uses Sentinel MCP via
  Foundry Toolbox plus local SOC-focused custom skills.
metadata:
  tags:
    - Agent Framework
    - Azure AI AgentServer
    - Hosted Agent
    - Security Operations
    - Sentinel MCP
    - Foundry Toolbox
    - Skills
template:
  name: security-investigator-agent-framework
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: TOOLBOX_MCP_NAME
      value: "{{TOOLBOX_MCP_NAME}}"
    - name: TOOLBOX_MCP_ENDPOINT
      value: "{{TOOLBOX_MCP_ENDPOINT}}"
    - name: LOG_LEVEL
      value: "{{LOG_LEVEL}}"
resources:
  - kind: model
    id: AZURE_AI_MODEL_DEPLOYMENT_NAME
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
