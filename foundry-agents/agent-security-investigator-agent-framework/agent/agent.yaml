# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
kind: hosted
name: security-investigator-agent-framework
protocols:
  - protocol: responses
    version: 1.0.0
resources:
  cpu: "1"
  memory: 2Gi
environment_variables:
  # FoundryChatClient calls the project endpoint directly, so unlike the Copilot
  # (BYOK) variant there is no AZURE_OPENAI_ENDPOINT.
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  - name: TOOLBOX_MCP_NAME
    value: ${TOOLBOX_MCP_NAME}
  - name: TOOLBOX_MCP_ENDPOINT
    value: ${TOOLBOX_MCP_ENDPOINT}
  - name: LOG_LEVEL
    value: ${LOG_LEVEL}
