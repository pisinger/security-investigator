# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: foundry-agent-sdk
services:
    security-investigator-agent-framework:
        project: agent
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "1"
                    memory: 2Gi
            deployments:
                - model:
                    format: OpenAI
                    name: gpt-5-mini
                    version: "2025-08-07"
                  name: gpt-5-mini
                  sku:
                    capacity: 100
                    name: GlobalStandard
infra:
    provider: bicep
    path: ./infra
