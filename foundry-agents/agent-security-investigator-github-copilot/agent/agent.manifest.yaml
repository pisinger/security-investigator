name: security-investigator-copilot-agent
description: >
  A Foundry hosted security investigator agent that brings its own harness —
  the GitHub Copilot SDK — instead of agent-framework. Uses Sentinel MCP via
  Foundry Toolbox plus local SOC-focused custom skills.
metadata:
  tags:
    - GitHub Copilot SDK
    - Bring Your Own Harness
    - Azure AI AgentServer
    - Hosted Agent
    - Security Operations
    - Sentinel MCP
    - Foundry Toolbox
    - Skills
template:
  name: security-investigator-copilot-agent
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: TOOLBOX_MCP_NAME
      value: "{{TOOLBOX_MCP_NAME}}"
    - name: TOOLBOX_MCP_ENDPOINT
      value: "{{TOOLBOX_MCP_ENDPOINT}}"
    - name: AZURE_OPENAI_ENDPOINT
      value: "{{AZURE_OPENAI_ENDPOINT}}"
    - name: AZURE_OPENAI_API_VERSION
      value: "{{AZURE_OPENAI_API_VERSION}}"
    - name: COPILOT_WIRE_API
      value: "{{COPILOT_WIRE_API}}"
    - name: COPILOT_LOG_LEVEL
      value: "{{COPILOT_LOG_LEVEL}}"
    - name: COPILOT_GITHUB_TOKEN
      value: "{{COPILOT_GITHUB_TOKEN}}"
    - name: GH_TOKEN
      value: "{{GH_TOKEN}}"
    - name: LOG_LEVEL
      value: "{{LOG_LEVEL}}"
resources:
  - kind: model
    id: AZURE_AI_MODEL_DEPLOYMENT_NAME
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
